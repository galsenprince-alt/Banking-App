<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none">
  <defs>
    <!-- Outer glow ring gradient -->
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#1a3a8f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.9"/>
    </radialGradient>
    <!-- Background circle gradient -->
    <radialGradient id="bgGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0f1e3d"/>
      <stop offset="100%" stop-color="#070e1f"/>
    </radialGradient>
    <!-- Blue upward arrow gradient -->
    <linearGradient id="arrowGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <!-- Dollar sign gradient -->
    <linearGradient id="dollarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#1d4ed8" stroke-width="0.5" opacity="0.4"/>

  <!-- Main circle background -->
  <circle cx="100" cy="100" r="94" fill="url(#bgGrad)"/>

  <!-- ── Credit Card ── -->
  <!-- Card body -->
  <rect x="62" y="28" width="76" height="50" rx="6" ry="6" fill="#1e2d50" filter="url(#cardShadow)"/>
  <!-- Card top highlight strip -->
  <rect x="62" y="28" width="76" height="12" rx="6" ry="6" fill="#263554"/>
  <rect x="62" y="34" width="76" height="6" fill="#263554"/>
  <!-- Chip (gold) -->
  <rect x="72" y="41" width="16" height="12" rx="2" ry="2" fill="#c89b3c"/>
  <rect x="74" y="44" width="12" height="2" rx="1" fill="#e8b84b" opacity="0.6"/>
  <rect x="74" y="47" width="12" height="2" rx="1" fill="#e8b84b" opacity="0.4"/>
  <!-- Three dots -->
  <circle cx="104" cy="47" r="2.5" fill="#94a3b8"/>
  <circle cx="112" cy="47" r="2.5" fill="#94a3b8"/>
  <circle cx="120" cy="47" r="2.5" fill="#94a3b8"/>

  <!-- ── Upward Arrow (blue, coming out of card) ── -->
  <!-- Arrow shaft -->
  <rect x="97" y="52" width="6" height="28" rx="2" fill="url(#arrowGrad)" filter="url(#glow)"/>
  <!-- Arrow head -->
  <polygon points="100,26 90,42 110,42" fill="url(#arrowGrad)" filter="url(#glow)"/>

  <!-- ── M $ F Text ── -->
  <!-- M -->
  <text x="44" y="125"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="0"
    fill="#e2e8f0">M</text>
  <!-- $ (blue) -->
  <text x="87" y="125"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="42"
    font-weight="700"
    fill="url(#dollarGrad)"
    filter="url(#glow)">$</text>
  <!-- F -->
  <text x="120" y="125"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="42"
    font-weight="700"
    fill="#e2e8f0">F</text>

  <!-- Divider line -->
  <line x1="38" y1="133" x2="162" y2="133" stroke="#334155" stroke-width="1"/>

  <!-- MOBILE BANKING subtitle -->
  <text x="100" y="150"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="10"
    font-weight="500"
    letter-spacing="5"
    text-anchor="middle"
    fill="#64748b">MOBILE BANKING</text>
</svg>
